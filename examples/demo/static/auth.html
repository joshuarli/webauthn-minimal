<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebAuthn Minimal Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#e0e0e0}
.card{width:100%;max-width:380px;padding:2rem;border:1px solid #333;border-radius:8px;background:#242424}
h1{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem;color:#fff}
.btn{width:100%;padding:.7rem 1rem;border:none;border-radius:6px;font-size:.95rem;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary{background:#4c8cf8;color:#fff}
.btn-secondary{background:#333;color:#e0e0e0;margin-top:.75rem}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
input{width:100%;padding:.6rem .75rem;border:1px solid #444;border-radius:6px;background:#1a1a1a;color:#e0e0e0;font-size:.95rem;font-family:inherit;margin-bottom:.75rem}
input:focus{outline:none;border-color:#4c8cf8}
.msg{margin-top:1rem;font-size:.85rem;color:#888;line-height:1.5}
.err{color:#f87171}
.token-box{margin-top:1rem;padding:.75rem;background:#1a1a1a;border:1px solid #333;border-radius:6px;font-family:monospace;font-size:.8rem;word-break:break-all;color:#a3e635;user-select:all}
.label{font-size:.8rem;color:#888;margin-bottom:.4rem}
#copy-btn{margin-top:.5rem;padding:.4rem .8rem;font-size:.8rem;background:#333;color:#ccc;border:1px solid #444;border-radius:4px;cursor:pointer}
#copy-btn:hover{background:#444}
@media(prefers-color-scheme:light){
  body{background:#f5f5f5;color:#222}
  .card{background:#fff;border-color:#e0e0e0}
  h1{color:#000}
  input{background:#fff;border-color:#ccc;color:#222}
  .btn-secondary{background:#eee;color:#333}
  .token-box{background:#f9f9f9;border-color:#ddd;color:#166534}
  #copy-btn{background:#eee;color:#444;border-color:#ccc}
}
</style>
</head>
<body>
<div class="card">
  <h1>WebAuthn Minimal Demo</h1>

  <div id="section-signin">
    <button class="btn btn-primary" id="signin-btn">Sign in with passkey</button>
    <div class="msg" id="signin-msg"></div>
  </div>

  <div id="section-register" style="display:none">
    <div class="label">Username</div>
    <input type="text" id="username-input" autocomplete="username" value="">
    <button class="btn btn-primary" id="register-btn">Register passkey</button>
    <button class="btn btn-secondary" id="back-btn">Back</button>
    <div class="msg" id="register-msg"></div>
  </div>

  <div id="section-token" style="display:none">
    <div class="msg" style="color:#a3e635;margin-bottom:.75rem">&#10003; Authenticated</div>
    <div id="token-display">
      <div class="label">SESSION_TOKEN</div>
      <div class="token-box" id="token-value"></div>
      <button id="copy-btn">Copy</button>
      <div class="msg">This token is shown once. Store it securely.</div>
    </div>
  </div>
</div>

<script>
function toB64url(buf) {
  const bytes = new Uint8Array(buf instanceof ArrayBuffer ? buf : buf.buffer);
  let s = '';
  for (const b of bytes) s += String.fromCharCode(b);
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function fromB64url(s) {
  s = s.replace(/-/g, '+').replace(/_/g, '/');
  while (s.length % 4) s += '=';
  const bin = atob(s);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf.buffer;
}

function decodeCreateOptions(publicKey) {
  return {
    ...publicKey,
    challenge: fromB64url(publicKey.challenge),
    user: { ...publicKey.user, id: fromB64url(publicKey.user.id) },
    excludeCredentials: (publicKey.excludeCredentials || []).map(c => ({
      ...c, id: fromB64url(c.id),
    })),
  };
}

function decodeGetOptions(publicKey) {
  return {
    ...publicKey,
    challenge: fromB64url(publicKey.challenge),
    allowCredentials: (publicKey.allowCredentials || []).map(c => ({
      ...c, id: fromB64url(c.id),
    })),
  };
}

function encodeCreateCredential(cred) {
  return {
    id: cred.id,
    rawId: toB64url(cred.rawId),
    type: cred.type,
    response: {
      attestationObject: toB64url(cred.response.attestationObject),
      clientDataJSON: toB64url(cred.response.clientDataJSON),
      transports: cred.response.getTransports ? cred.response.getTransports() : [],
    },
    extensions: cred.getClientExtensionResults(),
  };
}

function encodeGetCredential(cred) {
  return {
    id: cred.id,
    rawId: toB64url(cred.rawId),
    type: cred.type,
    response: {
      authenticatorData: toB64url(cred.response.authenticatorData),
      clientDataJSON: toB64url(cred.response.clientDataJSON),
      signature: toB64url(cred.response.signature),
      userHandle: cred.response.userHandle ? toB64url(cred.response.userHandle) : null,
    },
    extensions: cred.getClientExtensionResults(),
  };
}

const sessionParam = new URLSearchParams(location.search).get('session');

function showToken(token) {
  document.getElementById('section-signin').style.display = 'none';
  document.getElementById('section-register').style.display = 'none';
  document.getElementById('section-token').style.display = 'block';
  document.getElementById('token-value').textContent = token;
}

function setMsg(id, text, isErr) {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = 'msg' + (isErr ? ' err' : '');
}

function setDisabled(id, v) {
  document.getElementById(id).disabled = v;
}

async function doAuthenticate() {
  setMsg('signin-msg', 'Requesting challenge…', false);
  setDisabled('signin-btn', true);

  let optResp;
  try {
    optResp = await fetch('/auth/authenticate/options', { method: 'POST',
      headers: { 'Content-Type': 'application/json' }, body: '{}' });
  } catch (e) {
    setMsg('signin-msg', 'Network error', true);
    setDisabled('signin-btn', false);
    return;
  }

  if (!optResp.ok) {
    if (optResp.status === 404) {
      document.getElementById('section-signin').style.display = 'none';
      document.getElementById('section-register').style.display = 'block';
      return;
    }
    setMsg('signin-msg', 'Server error: ' + optResp.status, true);
    setDisabled('signin-btn', false);
    return;
  }

  const { session_id, options } = await optResp.json();

  let cred;
  try {
    setMsg('signin-msg', 'Waiting for passkey…', false);
    cred = await navigator.credentials.get({
      publicKey: decodeGetOptions(options),
    });
  } catch (e) {
    setMsg('signin-msg', e.name === 'NotAllowedError' ? 'Cancelled' : String(e), true);
    setDisabled('signin-btn', false);
    return;
  }

  setMsg('signin-msg', 'Verifying…', false);
  let verResp;
  try {
    verResp = await fetch('/auth/authenticate/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id, credential: encodeGetCredential(cred) }),
    });
  } catch (e) {
    setMsg('signin-msg', 'Network error', true);
    setDisabled('signin-btn', false);
    return;
  }

  if (!verResp.ok) {
    const body = await verResp.json().catch(() => ({}));
    setMsg('signin-msg', (body.error || 'Verification failed'), true);
    setDisabled('signin-btn', false);
    return;
  }

  const { token } = await verResp.json();
  showToken(token);
}

async function doRegister() {
  const username = document.getElementById('username-input').value.trim();
  if (!username) {
    setMsg('register-msg', 'Enter a username', true);
    return;
  }

  setMsg('register-msg', 'Requesting challenge…', false);
  setDisabled('register-btn', true);

  let optResp;
  try {
    optResp = await fetch('/auth/register/options', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
  } catch (e) {
    setMsg('register-msg', 'Network error', true);
    setDisabled('register-btn', false);
    return;
  }

  if (!optResp.ok) {
    const body = await optResp.json().catch(() => ({}));
    setMsg('register-msg', body.error || ('Server error: ' + optResp.status), true);
    setDisabled('register-btn', false);
    return;
  }

  const { session_id, options } = await optResp.json();

  let cred;
  try {
    setMsg('register-msg', 'Waiting for passkey…', false);
    cred = await navigator.credentials.create({
      publicKey: decodeCreateOptions(options),
    });
  } catch (e) {
    setMsg('register-msg', 'Network error', true);
    setDisabled('register-btn', false);
    return;
  }

  setMsg('register-msg', 'Verifying…', false);
  let verResp;
  try {
    verResp = await fetch('/auth/register/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id, credential: encodeCreateCredential(cred) }),
    });
  } catch (e) {
    setMsg('register-msg', 'Network error', true);
    setDisabled('register-btn', false);
    return;
  }

  if (!verResp.ok) {
    const body = await verResp.json().catch(() => ({}));
    setMsg('register-msg', body.error || 'Registration failed', true);
    setDisabled('register-btn', false);
    return;
  }

  const { token } = await verResp.json();
  showToken(token);
}

document.getElementById('signin-btn').addEventListener('click', doAuthenticate);
document.getElementById('register-btn').addEventListener('click', doRegister);
document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('section-register').style.display = 'none';
  document.getElementById('section-signin').style.display = 'block';
});
document.getElementById('copy-btn').addEventListener('click', async () => {
  const token = document.getElementById('token-value').textContent;
  try {
    await navigator.clipboard.writeText(token);
    document.getElementById('copy-btn').textContent = 'Copied!';
    setTimeout(() => { document.getElementById('copy-btn').textContent = 'Copy'; }, 2000);
  } catch (_) {}
});
</script>
</body>
</html>
