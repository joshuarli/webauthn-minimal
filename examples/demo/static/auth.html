<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebAuthn Minimal Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#1a1a1a;color:#e0e0e0}
.card{width:100%;max-width:380px;padding:2rem;border:1px solid #333;border-radius:8px;background:#242424}
h1{font-size:1.1rem;font-weight:600;margin-bottom:1.5rem;color:#fff}
.btn{width:100%;padding:.7rem 1rem;border:none;border-radius:6px;font-size:.95rem;cursor:pointer;font-family:inherit;transition:opacity .15s}
.btn-primary{background:#4c8cf8;color:#fff}
.btn-secondary{background:#333;color:#e0e0e0;margin-top:.75rem}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:default}
input{width:100%;padding:.6rem .75rem;border:1px solid #444;border-radius:6px;background:#1a1a1a;color:#e0e0e0;font-size:.95rem;font-family:inherit;margin-bottom:.75rem}
input:focus{outline:none;border-color:#4c8cf8}
.msg{margin-top:1rem;font-size:.85rem;color:#888;line-height:1.5}
.err{color:#f87171}
.token-box{margin-top:1rem;padding:.75rem;background:#1a1a1a;border:1px solid #333;border-radius:6px;font-family:monospace;font-size:.8rem;word-break:break-all;color:#a3e635;user-select:all}
.label{font-size:.8rem;color:#888;margin-bottom:.4rem}
#copy-btn{margin-top:.5rem;padding:.4rem .8rem;font-size:.8rem;background:#333;color:#ccc;border:1px solid #444;border-radius:4px;cursor:pointer}
#copy-btn:hover{background:#444}
@media(prefers-color-scheme:light){
  body{background:#f5f5f5;color:#222}
  .card{background:#fff;border-color:#e0e0e0}
  h1{color:#000}
  input{background:#fff;border-color:#ccc;color:#222}
  .btn-secondary{background:#eee;color:#333}
  .token-box{background:#f9f9f9;border-color:#ddd;color:#166534}
  #copy-btn{background:#eee;color:#444;border-color:#ccc}
}
</style>
</head>
<body>
<div class="card">
  <h1>WebAuthn Minimal Demo</h1>

  <div id="section-signin">
    <button class="btn btn-primary" id="signin-btn">Sign in with passkey</button>
    <div class="msg" id="signin-msg"></div>
    <div style="margin-top: 2rem; border-top: 1px solid #333; padding-top: 2rem"></div>
  </div>

  <div id="section-register">
    <h2 style="font-size: 1rem; margin-bottom: 1rem; color: #fff">Register New Key</h2>
    <div class="label">Username</div>
    <input type="text" id="username-input" autocomplete="username" value="">
    <button class="btn btn-primary" id="register-btn">Register</button>
    <button class="btn btn-secondary" id="back-btn">Back to Sign-in</button>
    <div class="msg" id="register-msg"></div>
  </div>

  <div id="section-token" style="display:none">
    <div class="msg" style="color:#a3e635;margin-bottom:.75rem">&#10003; Authenticated</div>
    <div id="token-display">
      <div class="label">SESSION_TOKEN</div>
      <div class="token-box" id="token-value"></div>
      <button id="copy-btn">Copy</button>
      <div class="msg">This token is shown once. Store it securely.</div>
    </div>
  </div>
</div>
<script src="auth.js"></script>
</body>
</html>
